name: ✨ Feature Request
description: Suggest an idea or enhancement for TheGreatCalculator
title: '[FEATURE]: '
labels: ['enhancement']
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        Have an idea to improve TheGreatCalculator? We'd love to hear it!

  - type: textarea
    id: problem
    attributes:
      label: Is your feature request related to a problem?
      description: A clear and concise description of what the problem is.
      placeholder: E.g., I'm frustrated when...
    validations:
      required: false

  - type: textarea
    id: solution
    attributes:
      label: Describe the solution you'd like
      description: A clear and concise description of what you want to happen.
      placeholder: Describe the feature or improvement...
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Describe alternatives you've considered
      description: A clear and concise description of any alternative solutions or features you've considered.
      placeholder: Any other ways you could solve this...
    validations:
      required: false

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Add any other context or screenshots about the feature request here.
      placeholder: Mockups, examples, or screenshots...
